feature: IDV 라우트 권한 가드 + scope=self + 모달 cancel API 정합

description: |
  본인인증(IDV) 라우트 (challenge 발급/검증/취소) 에 permission 미들웨어 + scope=self 가드를
  표준 메커니즘으로 적용. guest/user/admin 역할별 차등 접근 + 모달 취소 시 audit trail 정합.

  핵심 동작:
    - PermissionMiddleware 가 IDV 3개 라우트(request/verify/cancel)에 적용
    - Route::model('challenge', IdentityVerificationLog::class) 으로 모델 자동 resolve
    - resource_route_key='challenge' + owner_key='user_id' + permission_scopes 메타필드 표준
    - guest 역할에 IDV 3종 권한 부여 (Mode B 가입 흐름) — scope 검사 자동 스킵
    - user 역할에 IDV 3종 + scope=self (verify/cancel 본인 challenge 한정)
    - admin 역할은 all_leaf + scope=null (다른 사용자 challenge 도 다룰 수 있음)
    - 모달 취소 버튼 sequence 가 [apiCall(cancel), resolveIdentityChallenge, closeModal] 호출
    - cancel apiCall 은 challenge_id 가용성 if 가드 + onError suppress

axes:
  actor_role: [guest, user_with_perm, user_without_perm, admin]
  endpoint: [request, verify, cancel]
  challenge_owner: [self, other, none]
  challenge_status: [sent, verified, expired, cancelled, missing]
  modal_trigger_state: [challenge_id_present, challenge_id_absent]

exclusions:
  - { challenge_owner: none, endpoint: verify, reason: "verify 는 challenge 모델 바인딩 필요 — none 시 404 (가드 통과 후 모델 미해석)" }
  - { challenge_owner: none, endpoint: cancel, reason: "cancel 도 challenge 모델 바인딩 필요" }
  - { actor_role: guest, challenge_owner: self, reason: "guest 는 user_id 미보유 — self 매칭 무의미" }
  - { actor_role: guest, challenge_owner: other, reason: "guest 는 scope 검사 스킵으로 owner 무관" }
  - { modal_trigger_state: challenge_id_absent, endpoint: cancel, reason: "모달 if 가드로 호출 자체 스킵 — endpoint 액션 미발생" }

