test_files:
  - tests/Unit/Extension/CoreBackupHelperPruneTest.php
  - tests/Feature/Upgrade/AutoRollbackPruneTest.php
  - tests/Feature/Upgrade/Beta6BackfillManifestTest.php
  - tests/Feature/Console/Hotfix/RollbackStaleFilesCommandTest.php

# 본 매니페스트의 axes cross product 는 수천 케이스이나, 실제 회귀 가드는 test_files 의
# 통과 테스트들이 SSoT — 매니페스트는 매트릭스 SSoT 역할.
#
# 잔존 결함 / 본 매트릭스 범위 외:
#   - beta.5 → beta.6 부모 catch 시점의 즉시 자동 prune: 부모 (beta.5) 가 Step 6.5 를
#     모르므로 manifest 부재 → 즉시 prune 불가. beta.6 DataMigration 의 사후 작성 +
#     hotfix 커맨드가 fallback. CHANGELOG / 릴리스 노트 명시.
#   - DB 마이그레이션 down 자동 호출: 본 계획서 범위 외 (별도 이슈)
#   - 운영자의 활성 디렉토리 수정 상태에서 core:update 진입 시 사전 경고 UX: 별도 이슈
#   - hotfix:* prefix 의 누적 알림 (Stop 훅): 본 계획서 범위 외 별도 이슈 — §7.4.D
