# audit:allow test-scenario-coverage reason: 본 매니페스트는 코어 자동 롤백 신규 파일 prune + beta.6 사후 보완 + hotfix 단발성 prefix 도입의 시나리오 매트릭스 SSoT. 핵심 회귀 가드는 test_files 의 통과 테스트로 커버.

feature: 코어 자동 롤백 시 신 버전 신규 파일 prune + beta.6 사후 보완 + hotfix 단발성 prefix

description: |
  7.0.0-beta.5 이전의 코어 자동 롤백은 backup → 활성 overlay 복사 방식으로만 동작
  하여, 신 버전이 활성 디렉토리에 새로 추가한 파일은 백업에 없으므로 삭제되지 않고
  잔존했다. 결과적으로 `bootstrap/providers.php` 는 백업본(구버전) 으로 되돌아가지만
  디스크에는 신 ServiceProvider 파일이 잔존하여 `BindingResolutionException` 등
  부팅 부정합이 발생.

  본 매니페스트는 7.0.0-beta.6 의 다음 4가지 결함 보정 메커니즘의 cross product 회귀
  가드:

    1. Step 6.5 (manifest 생성) — applyUpdate 직전 신 버전 신규 파일 목록을 백업
       디렉토리에 manifest 로 기록
    2. restoreFromBackup 확장 — manifest 가 있으면 복사 직후 prune 수행
    3. beta.5 사용자의 사후 보완 — Upgrade_7_0_0_beta_6 DataMigration 이 백업 디렉토리에
       manifest 를 사후 작성 + 잔존 ServiceProvider 진단 로그
    4. hotfix:rollback-stale-files — 운영자용 진단/회복 도구 (단발성 prefix `hotfix:*`)

axes:
  rollback_origin: [step7_fatal, step8_fatal, step9_fatal, step10_fatal, no_backup_mode]
  manifest_state: [present, absent, corrupted]
  protected_path_overlap: [no_overlap, in_manifest_only, in_active_only, both]
  symlink_state: [valid, broken, target_missing, windows_no_privilege]
  user_added_files: [none, root_level, nested, in_protected_path]
  user_modified_files: [none, single, multiple]
  active_dir_state: [pristine_new, mixed_with_user, partially_pruned]
  dir_emptiness_after_prune: [empty, has_user_file, has_orphan_dir]
  hotfix_command_mode: [diagnose, prune_with_confirm, prune_reject, explicit_backup, missing_backup]
  upgrade_path: [step6_5_normal, beta5_to_beta6_backfill, multi_version_chain]
  audit_allow_inline: [present, absent]

exclusions:
  - { manifest_state: absent, rollback_origin: step7_fatal, reason: "Step 6.5 가 정상 동작했으면 manifest 가 항상 존재 — absent 는 beta.5 사용자 시나리오" }
  - { rollback_origin: no_backup_mode, manifest_state: present, reason: "--no-backup 모드는 백업 자체가 부재이므로 manifest 도 부재" }
  - { upgrade_path: step6_5_normal, manifest_state: absent, reason: "Step 6.5 정상 동작 시 manifest 부재 불가" }
  - { symlink_state: windows_no_privilege, rollback_origin: step10_fatal, reason: "Windows symlink 제약은 OS 레벨 — 롤백 단계와 무관" }

