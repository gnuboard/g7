# audit:allow test-scenario-coverage reason: 본 매니페스트는 인스톨러 .env 분리 흐름의 시나리오 매트릭스 SSoT 로 기록. 핵심 회귀 가드는 test_files 의 통과 테스트 + Manual 시나리오 검증으로 커버.

feature: 인스톨러 .env 분리 흐름 (storage/installer/runtime.php → finalize-env.php)

description: |
  설치 진행 중 동적 설정(DB 자격증명, APP_KEY) 을 .env 가 아닌
  storage/installer/runtime.php 에 기록하여 php artisan serve 의 .env mtime
  워처가 SSE/폴링 진행 중 워커를 재시작하지 않도록 한다. 설치 완료 UI 노출
  직후 브라우저가 finalize-env.php 를 fire-and-forget 으로 호출하면 그 시점
  에 .env 1회 머지 + INSTALLER_COMPLETED 추가가 일어난다.

  배경:
    - php artisan serve 의 ServeCommand 가 .env mtime 을 폴링 → 변경 시 워커 재시작.
    - 기존 인스톨러는 Step 5 SSE 진행 중 .env 를 3회 변경 (env_update / key:generate / complete_flag)
      하여 사용자에게 "Environment modified. Restarting server..." 와 함께 SSE 끊김이 보였다.
    - 동적 설정을 .env 와 물리적으로 분리하고, .env 갱신은 완료 UI 노출 후로 미루는 설계.

axes:
  installation_mode: [sse, polling]
  runtime_state: [absent, present_with_db_only, present_with_db_and_key, present_corrupted]
  env_state: [example_only, partially_filled, fully_finalized]
  finalize_call: [success, browser_aborted, retry_after_failure]
  rollback_trigger: [none, mid_install, post_finalize]
  # 이슈 #371 — finalize 가드 자가 차단 회귀 axis
  g7_installed_lock_state: [absent, present_before_finalize]
  finalize_guard_signal: [lock_only, env_completed_true_only, lock_and_env_completed_true, neither]
  orphaned_recovery_path: [none, upgrade_step_auto_finalize, upgrade_step_warn_manual_review]
  # 이슈 #371 — 웹 서버 사용자/그룹 정합 axis (Upgrade Step 의 권한 조정)
  cli_vs_phpfpm_user: [same_user, different_user_phpfpm_group_member, different_user_no_group_link]
  env_preexisting_mode: [absent, 0600_strict, 0640_group_readable, 0664_group_writable]
  bootstrap_cache_owner_group: [phpfpm_user, root_with_phpfpm_group, missing]
  # 이슈 #371 — 부모 프로세스 stale ENV 가 spawn 자식에 전파되어
  # Access denied 가 발생하던 회귀 차단 axis (한시적 보정 — beta.8 이후 트리거 안 됨)
  parent_process_env_state: [matches_runtime, stale_from_env_example_root, stale_partial]

exclusions:
  - { runtime_state: absent, env_state: example_only, finalize_call: success, reason: "runtime 부재 시 finalize 는 멱등적 no-op" }
  - { runtime_state: present_corrupted, finalize_call: success, reason: "손상된 runtime 은 머지 미수행, runtime 보존" }
  - { rollback_trigger: post_finalize, runtime_state: present_with_db_and_key, reason: "finalize 후 rollback 시점에는 runtime.php 가 이미 삭제된 상태" }
  - { g7_installed_lock_state: present_before_finalize, finalize_guard_signal: lock_only, finalize_call: success, reason: "이슈 #371 회귀 가드 — 락 단독 시 finalize 통과해야 함 (자가 차단 금지)" }
  - { orphaned_recovery_path: upgrade_step_warn_manual_review, env_state: fully_finalized, runtime_state: absent, reason: "정상 finalize 완료 환경은 warn 경로 자체가 트리거되지 않음" }

