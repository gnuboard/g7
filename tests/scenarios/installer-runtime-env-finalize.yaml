manual_verification:
  - scenario: A_artisan_serve
    description: |
      php artisan serve 환경에서 Step 1~5 진행 중 "Environment modified" 메시지
      0회 + Step 6 완료 화면 노출 직후 1회 재시작 + 재시작 후 .env 에 DB 자격증명
      + APP_KEY + INSTALLER_COMPLETED=true 모두 존재 + storage/installer/ 비어있음
  - scenario: B_php_S_or_apache
    description: |
      워처 없는 환경에서 동일 흐름 실행 시 동작 차이 없음 (재시작 미발생, finalize
      이후 .env 가 동일하게 머지됨)
  - scenario: C_polling_mode
    description: |
      installer.js 가 폴링 모드로 강제 진입한 경우 state-management.php → completed
      → finalize 트리거 → .env 머지 동일하게 동작
  - scenario: D_tab_close
    description: |
      Step 6 완료 직후 탭을 닫는 경우 runtime.php 가 보존되어 다음 부팅에서도
      ServiceProvider 가 config 주입 → 앱 정상 동작 (관리자 재호출 또는 admin
      알림 경로로 재시도 가능)
  - scenario: E_rollback
    description: |
      Step 5 진행 중 의도된 실패 (DB 권한 오류 등) 발생 시 rollbackCompleteFlag
      가 runtime.php / g7_installed / .env 의 INSTALLER_COMPLETED 모두 정리하여
      인스톨러 재진입 가능

rules_layer_coverage:
  - rule: service-provider-db-safety
    coverage: InstallerRuntimeServiceProvider 는 runtime.php 부재 시 즉시 return, DB 미접근, Schema::hasTable 무사용
  - rule: service-direct-data-access
    coverage: Provider 는 Config::set 만 호출 (Eloquent/DB facade 미사용)
  - rule: i18n-throw-hardcoded-korean
    coverage: rollback_runtime_removed lang key 를 ko/en 양쪽 등록 (public/install/lang)
